<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
    <header class="header">
  <nav class="navbar">
    <div class="logo">
      <h2>KOCHI</h2>
    </div>
    <div class="nav-link">
    <a href="../index.html">Home</a>
    <a href="contact.html" class="active">Contact</a>
</div>
</div>
    </nav>
      </header>
    <main>
        <section class="hero-contact">
            <img src="../images/rainbow-vortex.png" alt="Background">
            <div class="hero-text">
                <h1>CONTACT US</h1>
            </div>
        </section>

        <section class="contact-container">
            
            <div class="contact-details">
                <h2>Contact Details</h2>
                <div class="details-content">
                    <p>contact@kochi.com</p>
                    <p>(555) 555-5555</p>
                    <br>
                    <p><strong>Central HQ</strong></p>
                    <p>123 Avenue Street</p>
                    <p>City Township, CA 12345</p>
                </div>
            </div>

            <div class="online-inquiry">
                <h2>Online Inquiry</h2>
                <form action="#">
                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="e.g. John Smith">
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="e.g. name@domain.tld">
                    </div>

                    <div class="form-row">
                        <label for="message">Message</label>
                        <textarea id="message" rows="6" placeholder="Type your message here (between 20 and 500 characters)"></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit">SUBMIT</button>
                        <button type="reset" class="btn-reset">RESET</button>
                    </div>
                </form>
            </div>

        </section>
    </main>
    <footer class="footer">
  <p>Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</p>
</footer>
</body>
</html>
