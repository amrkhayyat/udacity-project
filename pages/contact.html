<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Kochi Solutions</title>
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="stylesheet" href="../css/layout.css">
</head>
<body>
    <header class="header">
  <nav class="navbar">
    <div class="logo">
      <span>KOCHI</span>
    </div>
    <div class="nav-link">
        <ul class="nav-links-list">
            <li><a href="../index.html">Home</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </div>
    </nav>
      </header>
    <main>
        <section class="hero-contact">
            <img src="../images/rainbow-vortex.png" alt="Vibrant rainbow bg image">
            <div class="hero-text">
                <h1>CONTACT US</h1>
            </div>
        </section>

        <section class="contact-container">
            
            <div class="contact-details">
                <h2>Contact Details</h2>
                <div class="details-content">
                    <address>
                   <p>Email: <a href="mailto:contact@kochi.com">contact@kochi.com</a></p>
                        <p>Phone: <a href="tel:+15555555555">(555) 555-5555</a></p>
                    
                    <p><strong>Central HQ</strong></p>
                    <p>123 Avenue Street</p>
                    <p>City Township, CA 12345</p>
                    </address>
                </div>
            </div>

            <div class="online-inquiry">
                <h2>Online Inquiry</h2>
                <form action="#">
                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g. John Smith" required>
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="e.g. name@domain.tld" required>
                    </div>

                    <div class="form-row">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Type your message here (between 20 and 500 characters)" required></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit">SUBMIT</button>
                        <button type="reset" class="btn-reset">RESET</button>
                    </div>
                </form>
            </div>

        </section>
    </main>
    <footer class="footer">
  <span>Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</span>
</footer>
</body>
</html>
